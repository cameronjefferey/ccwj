version: 2

seeds:
  # Schwab cash + account-total rows used by stg_account_balances for
  # equity snapshots. Manual upload and Schwab sync both write trades into
  # trade_history.csv and open positions into current_positions.csv, so no
  # Schwab-specific seed is needed for those.
  - name: schwab_account_balances
    config:
      column_types:
        account: string
        row_type: string
        market_value: float64
        cost_basis: float64
        unrealized_pnl: float64
        unrealized_pnl_pct: float64
        percent_of_account: float64
