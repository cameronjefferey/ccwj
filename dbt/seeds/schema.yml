version: 2

seeds:
  # Pin everything in the two main seeds to STRING so dbt seed loads are
  # deterministic regardless of what rows are present. BigQuery's CSV
  # autodetect will otherwise flip column types between runs (e.g. empty
  # seed → INT64, next load with "100.0"/"-2.0" values → load job fails).
  # stg_history / stg_current already cast to string on the way in, then
  # safe_cast to numeric, so this costs nothing downstream.
  #
  # ``tenant_id`` is the v2 warehouse tenant key — see
  # ``docs/V2_TENANT_KEY_DESIGN.md``. Format:
  #     ``"<broker_slug>:<broker_uuid>"``
  # e.g. ``"snaptrade:bed78305-a764-4c4d-b4c7-fe59e391f661"``.
  # Broker-stable (SnapTrade ships the UUID; we never mint), so it
  # survives Postgres resets / dataset re-creates / user-id renumbers.
  # This is the v2 replacement for the v1 ``broker_account_id`` SERIAL
  # which collided after Postgres ID reuse (May 24 2026 regression).
  #
  # ``account`` is now a DISPLAY string only — not the join key. It
  # stays so the Settings → Account UI and the templates that show
  # "Schwab ••••6342" labels keep working. The tenancy join is on
  # ``tenant_id`` only, as enforced by the
  # ``every_seed_row_has_tenant_id`` dbt test (error severity).
  #
  # ``user_id`` is now INFORMATIONAL only. It still flows through the
  # warehouse so admin / debug surfaces can show the owning user, but
  # tenant isolation no longer depends on it.
  - name: trade_history
    config:
      column_types:
        Account: string
        user_id: string
        tenant_id: string
        Date: string
        Action: string
        Symbol: string
        Description: string
        Quantity: string
        Price: string
        fees_and_comm: string
        Amount: string

  - name: current_positions
    config:
      column_types:
        Account: string
        user_id: string
        tenant_id: string
        Symbol: string
        Description: string
        Quantity: string
        Price: string
        price_change_dollar: string
        price_change_percent: string
        market_value: string
        day_change_dollar: string
        day_change_percent: string
        cost_bases: string
        gain_or_loss_dollat: string
        gain_or_loss_percent: string
        rating: string
        divident_reinvestment: string
        is_capital_gain: string
        percent_of_account: string
        expiration_date: string
        cost_per_share: string
        last_earnings_date: string
        dividend_yield: string
        last_dividend: string
        ex_dividend_date: string
        pe_ratio: string
        annual_week_low: string
        annual_week_high: string
        volume: string
        intrinsic_value: string
        in_the_money: string
        security_type: string
        margin_requirement: string

  # Cash + account-total rows used by stg_account_balances for
  # equity snapshots. The SnapTrade sync writes both balances and
  # positions into the same trio of seeds (account_balances.csv,
  # current_positions.csv, trade_history.csv) — no broker-specific
  # seed exists under v2 (``schwab_account_balances.csv`` dropped
  # during the SnapTrade-only consolidation, May 2026).
  - name: account_balances
    config:
      column_types:
        account: string
        user_id: string
        tenant_id: string
        row_type: string
        market_value: float64
        cost_basis: float64
        unrealized_pnl: float64
        unrealized_pnl_pct: float64
        percent_of_account: float64
