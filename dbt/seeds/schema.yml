version: 2

seeds:
  # Pin everything in the two main seeds to STRING so dbt seed loads are
  # deterministic regardless of what rows are present. BigQuery's CSV
  # autodetect will otherwise flip column types between runs (e.g. empty
  # seed → INT64, next load with "100.0"/"-2.0" values → load job fails).
  # stg_history / stg_current already cast to string on the way in, then
  # safe_cast to numeric, so this costs nothing downstream.
  # ``user_id`` is the (legacy) tenant key (Postgres ``users.id``) — see
  # ``docs/USER_ID_TENANCY.md``. Loaded as STRING so empty cells in
  # legacy rows survive the seed load (BigQuery rejects "" as INT64).
  # Staging models do ``safe_cast(user_id as int64)`` to recover NULL
  # for empty values and a real int otherwise. Stage 4 will tighten to
  # ``int64`` + NOT NULL once the backfill is verified zero-NULL.
  #
  # ``broker_account_id`` (Stage 0) is the **new** stable tenant key —
  # see ``docs/BROKER_ACCOUNT_ID_MIGRATION.md``. References
  # ``broker_accounts.id`` in Postgres. Nullable through Stages 0-3 so
  # legacy rows survive the load; tightens to NOT NULL in Stage 4
  # once the backfill verifies zero-NULL across every user-tied seed.
  - name: trade_history
    config:
      column_types:
        Account: string
        user_id: string
        broker_account_id: string
        Date: string
        Action: string
        Symbol: string
        Description: string
        Quantity: string
        Price: string
        fees_and_comm: string
        Amount: string

  - name: current_positions
    config:
      column_types:
        Account: string
        user_id: string
        broker_account_id: string
        Symbol: string
        Description: string
        Quantity: string
        Price: string
        price_change_dollar: string
        price_change_percent: string
        market_value: string
        day_change_dollar: string
        day_change_percent: string
        cost_bases: string
        gain_or_loss_dollat: string
        gain_or_loss_percent: string
        rating: string
        divident_reinvestment: string
        is_capital_gain: string
        percent_of_account: string
        expiration_date: string
        cost_per_share: string
        last_earnings_date: string
        dividend_yield: string
        last_dividend: string
        ex_dividend_date: string
        pe_ratio: string
        annual_week_low: string
        annual_week_high: string
        volume: string
        intrinsic_value: string
        in_the_money: string
        security_type: string
        margin_requirement: string

  # Cash + account-total rows used by stg_account_balances for
  # equity snapshots. Any broker connector (Schwab, SnapTrade, manual
  # upload) writes here. Manual upload and broker sync both write trades
  # into trade_history.csv and open positions into current_positions.csv,
  # so no broker-specific seed is needed for those.
  - name: account_balances
    config:
      column_types:
        account: string
        user_id: string
        broker_account_id: string
        row_type: string
        market_value: float64
        cost_basis: float64
        unrealized_pnl: float64
        unrealized_pnl_pct: float64
        percent_of_account: float64
