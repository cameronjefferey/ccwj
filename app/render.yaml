      - key: APP_BASE_URL
        value: "https://happytrader.me"
      # Email provider config: prod sends via Resend SMTP (the resend HTTP API
      # is 403'd on Render egress — see docs/EMAIL_STRATEGY.md). Inherit the
      # working config from the web service instead of `sync: false` so the cron
      # actually SENDS instead of silently falling back to the `log` backend
      # (which just prints the email and never delivers it).
      - key: EMAIL_BACKEND
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_BACKEND
      - key: EMAIL_FROM
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_FROM
      - key: EMAIL_SMTP_HOST
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_SMTP_HOST
      - key: EMAIL_SMTP_USER
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_SMTP_USER
      - key: EMAIL_SMTP_PASSWORD
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_SMTP_PASSWORD
      # weekly_preview reads BigQuery (int_enriched_current / stg_* ) for digest
      # content, so it needs the service-account creds. Inherit from the web
      # service (same pattern as DATABASE_URL/SECRET_KEY) rather than
      # `sync: false` — a blank value falls through to ADC and 500s with
      # DefaultCredentialsError.
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON_BASE64
        fromService:
          type: web
          name: ccwj
          envVarKey: GOOGLE_APPLICATION_CREDENTIALS_JSON_BASE64

  - type: cron
    name: happytrader-email-reengagement
    env: python
    schedule: "0 16 * * *"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli reengagement
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      # config.py hard-fails at import if SECRET_KEY is unset (the CLI imports
      # app/__init__.py -> config). Inherit the web service's key instead of
      # `sync: false` so the cron never fails on a blank/forgotten manual value.
      - key: SECRET_KEY
        fromService:
          type: web
          name: ccwj
          envVarKey: SECRET_KEY
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      # Email provider config: prod sends via Resend SMTP (the resend HTTP API
      # is 403'd on Render egress — see docs/EMAIL_STRATEGY.md). Inherit the
      # working config from the web service instead of `sync: false` so the cron
      # actually SENDS instead of silently falling back to the `log` backend
      # (which just prints the email and never delivers it).
      - key: EMAIL_BACKEND
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_BACKEND
      - key: EMAIL_FROM
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_FROM
      - key: EMAIL_SMTP_HOST
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_SMTP_HOST
      - key: EMAIL_SMTP_USER
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_SMTP_USER
      - key: EMAIL_SMTP_PASSWORD
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_SMTP_PASSWORD

  # Recurring "still disconnected — reconnect" reminder. Pure Postgres (no
  # BigQuery). Runs DAILY; the email_sends dedupe (key embeds stale-week
  # index) makes it effectively WEEKLY per broken-connection episode. Week 0
  # is owned by the one-time connection_dropped email in snaptrade_sync_cli.
  # Daily 17:00 UTC (~10am PDT). Transactional account-health mail — needs the
  # provider creds; prod uses the smtp backend (Resend HTTP is 403'd on Render
  # egress — see docs/EMAIL_STRATEGY.md).
  - type: cron
    name: happytrader-email-connection-reminder
    env: python
    schedule: "0 17 * * *"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli connection_reminder
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      # config.py hard-fails at import if SECRET_KEY is unset (the CLI imports
      # app/__init__.py -> config). Inherit the web service's key instead of
      # `sync: false` so the cron never fails on a blank/forgotten manual value.
      - key: SECRET_KEY
        fromService:
          type: web
          name: ccwj
          envVarKey: SECRET_KEY
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      # Email provider config: prod sends via Resend SMTP (the resend HTTP API
      # is 403'd on Render egress — see docs/EMAIL_STRATEGY.md). Inherit the
      # working config from the web service instead of `sync: false` so the cron
      # actually SENDS instead of silently falling back to the `log` backend
      # (which just prints the email and never delivers it).
      - key: EMAIL_BACKEND
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_BACKEND
      - key: EMAIL_FROM
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_FROM
      - key: EMAIL_SMTP_HOST
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_SMTP_HOST
      - key: EMAIL_SMTP_USER
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_SMTP_USER
      - key: EMAIL_SMTP_PASSWORD
        fromService:
