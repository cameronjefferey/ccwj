# app/render.yaml — Render Blueprint definition.
#
# SCOPE: This Blueprint manages **background jobs only** (cron services).
# The web service `ccwj` (https://happytrader.me) is intentionally NOT
# declared here — it was created manually in the Render dashboard and
# stays manually managed for now.
#
# Broker sync is PRIMARILY EVENT-DRIVEN via the SnapTrade ACCOUNT_HOLDINGS_UPDATED
# webhook (app/webhooks.py): SnapTrade detects a holdings change (plan = REAL-TIME
# as of 2026-07-02, upgraded from Daily/cached) → pings POST /webhooks/snaptrade →
# we sync that account. The webhook is the FRESHNESS DRIVER because it fires AFTER
# SnapTrade has pulled fresh data from the broker, so the data we read is current.
# On the real-time plan these fire many times a day, so the handler DEBOUNCES per
# account (SNAPTRADE_WEBHOOK_DEBOUNCE_SECONDS, default 60s) — a burst collapses
# into one sync+build (reporting is close-based; intraday marks aren't core). The
# in-product "Sync now" button is the manual path.
#
# TWO manually-managed Render crons (created in the dashboard, NOT declared in
# this Blueprint) run app/snaptrade_sync_cli.py. Each syncs every account then
# pushes ONE batched seed commit (merge_and_push_seeds_batch) → a single dbt
# build, instead of the old ~14-commits-a-night fan-out.
#
#   1. happytrader-snaptrade-intraday — REAL-TIME ORDERS POLL, every ~15 min
#      during market hours (`--intraday`; suggested schedule `*/15 13-21 * * 1-5`
#      UTC, covering 9:30am–4pm ET year-round + a post-close buffer, DST-agnostic).
#      Reads the real-time recent_orders feed (skipping the T+1 activities feed)
#      and pushes a HISTORY-ONLY diff: only NEW trade fills hit trade_history.csv;
#      the positions/balances SNAPSHOTS are NOT rewritten (they drift on every
#      read as marks move — pushing them every 15 min rebuilt the whole warehouse
#      each run). Snapshot freshness stays with the webhook syncs + 23:00
#      backstop; daily valuation with prices_refresh.yml. This exists because a
#      broker's holdings poll — and thus its ACCOUNT_HOLDINGS_UPDATED webhook —
#      can lag hours (Schwab: ~once/day evening) even on the real-time plan, yet
#      recent_orders IS real-time on read (proven 2026-07-10: a Schwab account
#      ~19h stale on holdings still returned the just-closed contracts). So the
#      poll surfaces same-day trades without waiting on the daily Schwab webhook,
#      with NO billed refresh. A poll with no new fills is a true no-op (no
#      commit → no build).
#   2. happytrader-snaptrade-sync — PLAIN BACKSTOP at 23:00 UTC weekdays
#      (force_refresh=False, reads activities + orders): re-reads SnapTrade's
#      cache as a safety net for missed webhooks AND lands the authoritative T+1
#      activities detail overnight (which the intraday poll deliberately skips).
#      The snaptrade_sync_observations log showed real webhook misses under the
#      old Daily plan (e.g. 2026-06-24/25 synced only via the cron); 23:00 UTC is
#      a quiet off-hours slot.
#
# REMOVED: the market-close `happytrader-snaptrade-refresh --force-refresh` cron.
# SnapTrade support (2026-07-10) confirmed refresh_brokerage_authorization is a
# CACHED-plan-only endpoint (our real-time plan 403s it) and only ever touches
# `activities`, which are T+1 for EVERY broker. It could never surface same-day
# trades, so it was deleted. Same-day trades ride the real-time ORDERS feed
# (recent_orders — now polled by the intraday cron above). If
# happytrader-snaptrade-refresh still exists in the Render dashboard, DELETE it.
#
# Do not add direct broker OAuth crons.
#
# DST NOTE — Render cron schedules below are UTC and DO NOT observe DST.
#
services:

  # ──────────────────────────────────────────────────────────────────
  # Lifecycle / product-marketing email digests.
  #
  # All three run `app.email_digests_cli <kind>` and need the email
  # provider creds (EMAIL_BACKEND=resend|smtp + RESEND_API_KEY/EMAIL_SMTP_*),
  # DATABASE_URL (opt-in flags + send log), and BigQuery creds (digest
  # content). APP_BASE_URL builds the links since these run outside a
  # request context. Each send is idempotent via the email_sends table, so
  # a missed run self-heals on the next pass without double-sending.
  #
  # Schedules are UTC and do NOT observe DST (see DST note at top).
  #   Sat 15:00 UTC (~8am PDT) → weekly summary (recap of the week just traded)
  #   Sun 23:00 UTC (~4pm PDT) → weekly preview (the week ahead)
  #   Daily 16:00 UTC (~9am PDT) → re-engagement (dormant-user nudge; windowed)
  # ──────────────────────────────────────────────────────────────────

  - type: cron
    name: happytrader-email-weekly-summary
    env: python
    schedule: "0 15 * * 6"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli weekly_summary
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      # config.py hard-fails at import if SECRET_KEY is unset (the CLI imports
      # app/__init__.py -> config). Inherit the web service's key instead of
      # `sync: false` so the cron never fails on a blank/forgotten manual value.
      - key: SECRET_KEY
        fromService:
          type: web
          name: ccwj
          envVarKey: SECRET_KEY
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      # Email provider config: prod sends via Resend SMTP (the resend HTTP API
      # is 403'd on Render egress — see docs/EMAIL_STRATEGY.md). Inherit the
      # working config from the web service instead of `sync: false` so the cron
      # actually SENDS instead of silently falling back to the `log` backend
      # (which just prints the email and never delivers it).
      - key: EMAIL_BACKEND
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_BACKEND
      - key: EMAIL_FROM
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_FROM
      - key: EMAIL_SMTP_HOST
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_SMTP_HOST
      - key: EMAIL_SMTP_USER
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_SMTP_USER
      - key: EMAIL_SMTP_PASSWORD
        fromService:
          type: web
          name: ccwj
          envVarKey: EMAIL_SMTP_PASSWORD
      # weekly_summary reads BigQuery (mart_weekly_summary) for digest content,
      # so it needs the service-account creds. Inherit from the web service
      # (same pattern as DATABASE_URL/SECRET_KEY) rather than `sync: false` —
      # a blank value falls through to ADC and 500s with DefaultCredentialsError.
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON_BASE64
        fromService:
          type: web
          name: ccwj
          envVarKey: GOOGLE_APPLICATION_CREDENTIALS_JSON_BASE64

  - type: cron
    name: happytrader-email-weekly-preview
    env: python
    schedule: "0 23 * * 0"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli weekly_preview
    envVars:
