# app/render.yaml — Render Blueprint definition.
#
# SCOPE: This Blueprint manages **background jobs only** (cron services).
# The web service `ccwj` (https://happytrader.me) is intentionally NOT
# declared here — it was created manually in the Render dashboard and
# stays manually managed for now.
#
# Broker sync is EVENT-DRIVEN via the SnapTrade ACCOUNT_HOLDINGS_UPDATED webhook
# (app/webhooks.py): SnapTrade finishes its once-daily broker sync (plan = Daily)
# → pings POST /webhooks/snaptrade → we sync that account. There is intentionally
# NO scheduled SnapTrade sync cron: the old timed job ran at 20:06 UTC, ~34 min
# BEFORE SnapTrade's daily Schwab refresh landed (~20:40 UTC), so it always read
# stale data. The in-product "Sync now" button is the manual fallback. Do not
# reintroduce a timed SnapTrade sync or direct broker OAuth crons.
#
# DST NOTE — Render cron schedules below are UTC and DO NOT observe DST.
#
services:

  # ──────────────────────────────────────────────────────────────────
  # Lifecycle / product-marketing email digests.
  #
  # All three run `app.email_digests_cli <kind>` and need the email
  # provider creds (EMAIL_BACKEND=resend|smtp + RESEND_API_KEY/EMAIL_SMTP_*),
  # DATABASE_URL (opt-in flags + send log), and BigQuery creds (digest
  # content). APP_BASE_URL builds the links since these run outside a
  # request context. Each send is idempotent via the email_sends table, so
  # a missed run self-heals on the next pass without double-sending.
  #
  # Schedules are UTC and do NOT observe DST (see DST note at top).
  #   Sat 15:00 UTC (~8am PDT) → weekly summary (recap of the week just traded)
  #   Sun 23:00 UTC (~4pm PDT) → weekly preview (the week ahead)
  #   Daily 16:00 UTC (~9am PDT) → re-engagement (dormant-user nudge; windowed)
  # ──────────────────────────────────────────────────────────────────

  - type: cron
    name: happytrader-email-weekly-summary
    env: python
    schedule: "0 15 * * 6"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli weekly_summary
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      - key: SECRET_KEY
        sync: false
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON_BASE64
        sync: false

  - type: cron
    name: happytrader-email-weekly-preview
    env: python
    schedule: "0 23 * * 0"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli weekly_preview
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      - key: SECRET_KEY
        sync: false
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON_BASE64
        sync: false

  - type: cron
    name: happytrader-email-reengagement
    env: python
    schedule: "0 16 * * *"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli reengagement
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      - key: SECRET_KEY
        sync: false
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # Recurring "still disconnected — reconnect" reminder. Pure Postgres (no
  # BigQuery). Runs DAILY; the email_sends dedupe (key embeds stale-week
  # index) makes it effectively WEEKLY per broken-connection episode. Week 0
  # is owned by the one-time connection_dropped email in snaptrade_sync_cli.
  # Daily 17:00 UTC (~10am PDT). Transactional account-health mail — needs the
  # provider creds; prod uses the smtp backend (Resend HTTP is 403'd on Render
  # egress — see docs/EMAIL_STRATEGY.md).
  - type: cron
    name: happytrader-email-connection-reminder
    env: python
    schedule: "0 17 * * *"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli connection_reminder
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      - key: SECRET_KEY
        sync: false
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_SMTP_HOST
        sync: false
      - key: EMAIL_SMTP_PORT
        sync: false
      - key: EMAIL_SMTP_USER
        sync: false
      - key: EMAIL_SMTP_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
