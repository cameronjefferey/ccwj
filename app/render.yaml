# app/render.yaml — Render Blueprint definition.
#
# SCOPE: This Blueprint manages **background jobs only** (cron services).
# The web service `ccwj` (https://happytrader.me) is intentionally NOT
# declared here — it was created manually in the Render dashboard and
# stays manually managed for now.
#
# Going forward, broker sync runs through SnapTrade only. Add additional
# cron entries here only if a second scheduled job is needed (e.g. price
# refresh); do not reintroduce direct broker OAuth crons.
#
# DST NOTE — Render cron schedules are UTC and DO NOT observe DST.
# Preferred local time: ~1:06pm Pacific post-close. When DST ends in
# November, add +1 hour to the UTC schedule below.
#
# Stagger choreography (post-close window in PDT):
#   20:06 UTC → 1:06pm PDT → `happytrader-snaptrade-sync`
#
services:

  # ──────────────────────────────────────────────────────────────────
  # SnapTrade sync (1:06pm PDT / 20:06 UTC).
  #
  # Covers every broker connected through SnapTrade (Schwab, Fidelity,
  # Vanguard, Robinhood, IBKR, Tradier, etc.). Iterates every row in
  # `broker_tenants` / legacy `snaptrade_accounts`, normalizes activities
  # + positions + balances, pushes seed CSVs to GitHub which triggers the
  # dbt rebuild.
  # ──────────────────────────────────────────────────────────────────
  - type: cron
    name: happytrader-snaptrade-sync
    env: python
    schedule: "6 20 * * 1-5"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.snaptrade_sync_cli
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      - key: SECRET_KEY
        sync: false

      - key: SNAPTRADE_SYNC_TRANSACTION_DAYS
        value: "3"

      - key: SNAPTRADE_CLIENT_ID
        sync: false
      - key: SNAPTRADE_CONSUMER_KEY
        sync: false

      - key: GITHUB_PAT
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_BRANCH
        sync: false

  # ──────────────────────────────────────────────────────────────────
  # Lifecycle / product-marketing email digests.
  #
  # All three run `app.email_digests_cli <kind>` and need the email
  # provider creds (EMAIL_BACKEND=resend|smtp + RESEND_API_KEY/EMAIL_SMTP_*),
  # DATABASE_URL (opt-in flags + send log), and BigQuery creds (digest
  # content). APP_BASE_URL builds the links since these run outside a
  # request context. Each send is idempotent via the email_sends table, so
  # a missed run self-heals on the next pass without double-sending.
  #
  # Schedules are UTC and do NOT observe DST (see DST note at top).
  #   Sat 15:00 UTC (~8am PDT) → weekly summary (recap of the week just traded)
  #   Sun 23:00 UTC (~4pm PDT) → weekly preview (the week ahead)
  #   Daily 16:00 UTC (~9am PDT) → re-engagement (dormant-user nudge; windowed)
  # ──────────────────────────────────────────────────────────────────

  - type: cron
    name: happytrader-email-weekly-summary
    env: python
    schedule: "0 15 * * 6"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli weekly_summary
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      - key: SECRET_KEY
        sync: false
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON_BASE64
        sync: false

  - type: cron
    name: happytrader-email-weekly-preview
    env: python
    schedule: "0 23 * * 0"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli weekly_preview
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      - key: SECRET_KEY
        sync: false
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON_BASE64
        sync: false

  - type: cron
    name: happytrader-email-reengagement
    env: python
    schedule: "0 16 * * *"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli reengagement
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      - key: SECRET_KEY
        sync: false
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
