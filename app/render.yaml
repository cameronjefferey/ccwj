# app/render.yaml — Render Blueprint definition.
#
# SCOPE: This Blueprint manages **background jobs only** (cron services).
# The web service `ccwj` (https://happytrader.me) is intentionally NOT
# declared here — it was created manually in the Render dashboard and
# stays manually managed for now.
#
# Broker sync is PRIMARILY EVENT-DRIVEN via the SnapTrade ACCOUNT_HOLDINGS_UPDATED
# webhook (app/webhooks.py): SnapTrade detects a holdings change (plan = REAL-TIME
# as of 2026-07-02, upgraded from Daily/cached) → pings POST /webhooks/snaptrade →
# we sync that account. The webhook is the FRESHNESS DRIVER because it fires AFTER
# SnapTrade has pulled fresh data from the broker, so the data we read is current.
# On the real-time plan these fire many times a day, so the handler DEBOUNCES per
# account (SNAPTRADE_WEBHOOK_DEBOUNCE_SECONDS, default 60s) — a burst collapses
# into one sync+build (reporting is close-based; intraday marks aren't core). The
# in-product "Sync now" button is the manual path.
#
# TWO manually-managed Render crons (created in the dashboard, NOT declared in
# this Blueprint) run app/snaptrade_sync_cli.py. Both sync every account then push
# ONE batched seed commit (merge_and_push_seeds_batch) → a single dbt build,
# instead of the old ~14-commits-a-night fan-out.
#
#   1. happytrader-snaptrade-refresh — MARKET-CLOSE FORCE-REFRESH.
#      `python -m app.snaptrade_sync_cli --force-refresh` at ~20:10 UTC weekdays
#      (4:10pm ET in summer; crons ignore DST so it's ~1h before close in winter,
#      which the 23:00 backstop covers). It ACTIVELY asks SnapTrade to repoll every
#      broker before reading — the only way to pull intraday changes from brokers
#      SnapTrade does not poll in real-time. Schwab is daily-only via SnapTrade
#      regardless of the real-time plan (the plan governs SnapTrade's AUTOMATIC
#      polling; a manual refresh_brokerage_authorization is a separate, per-call-
#      billed API), so this pass is what lets a Schwab trader see same-day
#      closes/opens instead of waiting for SnapTrade's once-a-day Schwab poll.
#      BILLED per refresh — only this cron passes --force-refresh.
#
#   2. happytrader-snaptrade-sync — PLAIN BACKSTOP at 23:00 UTC weekdays
#      (force_refresh=False, no billed refresh): re-reads SnapTrade's cache as a
#      safety net for days every webhook delivery is missed (the
#      snaptrade_sync_observations log showed real misses under the old Daily plan
#      — e.g. 2026-06-24/25 synced only via the cron). On the real-time plan
#      SnapTrade's cache is continuously fresh, so its TIMING is no longer critical
#      (it used to have to run AFTER the ~20:40–22:10 UTC nightly refresh or it read
#      day-old data); 23:00 UTC is retained simply as a quiet off-hours slot.
#
# Do not add direct broker OAuth crons.
#
# DST NOTE — Render cron schedules below are UTC and DO NOT observe DST.
#
services:

  # ──────────────────────────────────────────────────────────────────
  # Lifecycle / product-marketing email digests.
  #
  # All three run `app.email_digests_cli <kind>` and need the email
  # provider creds (EMAIL_BACKEND=resend|smtp + RESEND_API_KEY/EMAIL_SMTP_*),
  # DATABASE_URL (opt-in flags + send log), and BigQuery creds (digest
  # content). APP_BASE_URL builds the links since these run outside a
  # request context. Each send is idempotent via the email_sends table, so
  # a missed run self-heals on the next pass without double-sending.
  #
  # Schedules are UTC and do NOT observe DST (see DST note at top).
  #   Sat 15:00 UTC (~8am PDT) → weekly summary (recap of the week just traded)
  #   Sun 23:00 UTC (~4pm PDT) → weekly preview (the week ahead)
  #   Daily 16:00 UTC (~9am PDT) → re-engagement (dormant-user nudge; windowed)
  # ──────────────────────────────────────────────────────────────────

  - type: cron
    name: happytrader-email-weekly-summary
    env: python
    schedule: "0 15 * * 6"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli weekly_summary
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      - key: SECRET_KEY
        sync: false
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON_BASE64
        sync: false

  - type: cron
    name: happytrader-email-weekly-preview
    env: python
    schedule: "0 23 * * 0"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli weekly_preview
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      - key: SECRET_KEY
        sync: false
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON_BASE64
        sync: false

  - type: cron
    name: happytrader-email-reengagement
    env: python
    schedule: "0 16 * * *"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli reengagement
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      - key: SECRET_KEY
        sync: false
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # Recurring "still disconnected — reconnect" reminder. Pure Postgres (no
  # BigQuery). Runs DAILY; the email_sends dedupe (key embeds stale-week
  # index) makes it effectively WEEKLY per broken-connection episode. Week 0
  # is owned by the one-time connection_dropped email in snaptrade_sync_cli.
  # Daily 17:00 UTC (~10am PDT). Transactional account-health mail — needs the
  # provider creds; prod uses the smtp backend (Resend HTTP is 403'd on Render
  # egress — see docs/EMAIL_STRATEGY.md).
  - type: cron
    name: happytrader-email-connection-reminder
    env: python
    schedule: "0 17 * * *"
    buildCommand: pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt || pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.email_digests_cli connection_reminder
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      - key: SECRET_KEY
        sync: false
      - key: APP_BASE_URL
        value: "https://happytrader.me"
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_SMTP_HOST
        sync: false
      - key: EMAIL_SMTP_PORT
        sync: false
      - key: EMAIL_SMTP_USER
        sync: false
      - key: EMAIL_SMTP_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
