# app/render.yaml — Render Blueprint definition.
#
# SCOPE: This Blueprint manages **background jobs only** (cron services).
# The web service `ccwj` (https://happytrader.me) is intentionally NOT
# declared here — it was created manually in the Render dashboard and
# stays manually managed for now. Migrating it would require a service
# rename, custom-domain re-attachment, and full env-var re-entry, which
# isn't worth the downtime just to consolidate config.
#
# Going forward, add new broker syncs (Fidelity, IBKR, Robinhood, etc.)
# as additional `type: cron` entries below. After editing, push to
# master and click "Sync" on the Blueprint in the Render dashboard for
# Render to apply the changes.
#
# OUTSIDE THIS FILE (Blueprint can't see them):
#   - `happy-trader-schwab-sync-close` (crn-d7ptctebn58s73867bh0):
#     manual cron, created in the Render dashboard before this Blueprint
#     existed. Same code (python -m app.schwab_sync_cli) and same env
#     vars as `happytrader-schwab-sync` below; runs at 21:01 UTC for the
#     primary post-close pull. To change its schedule, edit it in the
#     Render dashboard (https://dashboard.render.com/cron/crn-d7ptctebn58s73867bh0/settings).
#     The Blueprint Sync button does NOT touch it.
#   - `ccwj` web service (srv-d0qea7ripnbc73ea9v5g): the Flask app at
#     happytrader.me. Manually managed for the rename/downtime reason
#     stated above.
#
services:

  # ──────────────────────────────────────────────────────────────────
  # Daily Schwab sync — replaces the manual "Sync now" button click.
  #
  # Iterates every row in `schwab_connections` and runs the same
  # _run_sync() the dashboard button calls. Each successful sync pushes
  # updated seed CSVs to GitHub, which triggers
  # .github/workflows/bigquery_update.yml on push and rebuilds the dbt
  # marts. No BigQuery credentials needed here — the cron only touches
  # Postgres, Schwab, and the GitHub API.
  #
  # Schedule: Render cron is UTC and does NOT observe DST. 21:30 UTC =
  # 4:30pm EST (winter) / 5:30pm EDT (summer), i.e. always 30+ min after
  # the 4pm ET US equity market close. Weekdays only (1–5).
  # ──────────────────────────────────────────────────────────────────
  - type: cron
    name: happytrader-schwab-sync
    env: python
    schedule: "30 21 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.schwab_sync_cli
    envVars:
      # Pin Python explicitly. Render now defaults new services to
      # Python 3.14, which has no prebuilt wheels for several packages
      # we pin (pydantic_core==2.27.2, etc.) and falls back to a Rust
      # source build that fails in Render's read-only Cargo cache.
      # 3.12.x has wheels for everything in requirements.txt.
      - key: PYTHON_VERSION
        value: "3.12.8"

      # Pull DATABASE_URL from the existing manually-managed web service
      # so we never have two divergent copies of the connection string.
      # `name` here must match the service's exact name in the Render
      # dashboard (currently `ccwj`). `key` is how this var is named
      # locally on the cron service; `envVarKey` is the name on the
      # source service.
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL

      # `python -m app.schwab_sync_cli` imports the `app` package, which
      # runs `app/__init__.py`, which loads `config.Config` and raises
      # if SECRET_KEY is unset. The cron has no sessions, cookies, or
      # CSRF — SECRET_KEY here is purely a placeholder for Flask app
      # init. Any non-empty string works. (Tried `generateValue: true`;
      # Render's Blueprint sync didn't reliably apply it to an existing
      # cron service, so we treat it like the other secrets below and
      # set it once in the Render dashboard.)
      - key: SECRET_KEY
        sync: false

      # Each daily run only needs a small overlapping window — the
      # previous day's run already covered everything older. 3 days
      # handles a single missed run (long weekend, Render outage)
      # without re-pulling 60 days of trades on every cron tick.
      - key: SCHWAB_SYNC_TRANSACTION_DAYS
        value: "3"

      # The values below must be set ONCE in the Render dashboard for
      # this cron service (sync: false = Render won't auto-overwrite).
      # Use the same values that are already configured on `ccwj`.
      - key: SCHWAB_APP_KEY
        sync: false
      - key: SCHWAB_APP_SECRET
        sync: false
      - key: GITHUB_PAT
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_BRANCH
        sync: false

  # ──────────────────────────────────────────────────────────────────
  # Daily SnapTrade sync — covers every NON-Schwab broker (Fidelity,
  # Vanguard, Robinhood, IBKR, Tradier, etc.) connected through the
  # SnapTrade aggregator. Same shape as the Schwab cron above:
  # iterates every row in `snaptrade_accounts`, normalizes activities
  # + positions + balances + recent_orders, pushes seed CSVs to GitHub
  # which triggers the dbt rebuild.
  #
  # Schedule: 21:02 UTC = 4:02pm EST (winter) / 5:02pm EDT (summer),
  # i.e. always at least 2 minutes after the 4pm ET market close. The
  # design goal is "users get to review same-day activity before the
  # next session opens." Picking a UTC time that's post-close in winter
  # means it drifts to ~1 hour post-close in summer; we accept the
  # drift in exchange for never accidentally firing pre-close.
  #
  # Stagger logic: 21:01 UTC is held by the manually-managed
  # `happy-trader-schwab-sync-close` cron (NOT Blueprint-managed; lives
  # in the Render dashboard only — its schedule must be updated there,
  # not here). We sit at 21:02 to give Schwab its 1-minute head start
  # and avoid coincident GitHub pushes — the Actions workflow's
  # `concurrency: cancel-in-progress: true` setting silently drops
  # duplicate-minute pushes otherwise. The 28-minute gap to the daily
  # Schwab backup at 21:30 UTC stays comfortably wide.
  # ──────────────────────────────────────────────────────────────────
  - type: cron
    name: happytrader-snaptrade-sync
    env: python
    schedule: "2 21 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.snaptrade_sync_cli
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromService:
          type: web
          name: ccwj
          envVarKey: DATABASE_URL
      - key: SECRET_KEY
        sync: false

      # Each daily run only needs a small overlapping window. The
      # routine-vs-full-history decision happens per row inside the CLI
      # (first sync gets full window; subsequent syncs get this).
      - key: SCHWAB_SYNC_TRANSACTION_DAYS
        value: "3"

      # SnapTrade SDK credentials — set ONCE in the Render dashboard.
      # SNAPTRADE_REDIRECT_URI is only used by the OAuth callback flow
      # and is not needed by the cron.
      - key: SNAPTRADE_CLIENT_ID
        sync: false
      - key: SNAPTRADE_CONSUMER_KEY
        sync: false

      - key: GITHUB_PAT
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_BRANCH
        sync: false
