name: Update Daily Position Performance

# Runs dbt (seeds + models) and daily prices so BigQuery matches repo seeds.
# Triggered on every push to the default branch — including Schwab/CSV seed commits
# from the app (GITHUB_PAT + GITHUB_REPO). Keep GITHUB_BRANCH in Render aligned
# with branches listed here (master or main).
on:
  push:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    # 1pm PST daily (21:00 UTC; market close)
    - cron: '0 21 * * *'

jobs:
  update-performance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.DBT_KEYFILE_JSON }}'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up DBT profiles
        run: |
          mkdir -p ~/.dbt
          cp dbt/profiles.yml ~/.dbt/profiles.yml
          echo '${{ secrets.DBT_KEYFILE_JSON }}' > ~/.dbt/keyfile.json

      - name: Run DBT build (seeds + models, excluding price-dependent)
        run: |
          cd dbt
          dbt build --exclude "stg_daily_prices+"
        env:
          DBT_PROJECT_ID: ${{ secrets.DBT_PROJECT_ID }}
          DBT_GCS_BUCKET: ${{ secrets.DBT_GCS_BUCKET }}
          DBT_DATAPROC_REGION: ${{ secrets.DBT_DATAPROC_REGION }}

      - name: Fetch daily stock prices
        run: python current_position_stock_price.py

      - name: Run DBT build (price-dependent models)
        run: |
          cd dbt
          dbt build --select "stg_daily_prices+"
        env:
          DBT_PROJECT_ID: ${{ secrets.DBT_PROJECT_ID }}
          DBT_GCS_BUCKET: ${{ secrets.DBT_GCS_BUCKET }}
          DBT_DATAPROC_REGION: ${{ secrets.DBT_DATAPROC_REGION }}

      - name: Retrain BQML behavior model
        # Uses the same DBT_KEYFILE_JSON credential as the dbt steps above
        # via google-github-actions/auth (GOOGLE_APPLICATION_CREDENTIALS
        # is exported into the runner env).  No new secrets needed.
        run: python scripts/train_bqml.py

